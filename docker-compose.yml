services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=tone_reply
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY:-}
      - CORS_ORIGINS=http://localhost:8000,http://localhost:19006
    depends_on:
      - mongo

volumes:
  mongo_data:
